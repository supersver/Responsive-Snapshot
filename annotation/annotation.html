<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Annotate — Responsive Snapshot</title>
    <link rel="stylesheet" href="annotation.css" />
  </head>
  <body>
    <div class="toolbar">
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
          <defs>
            <linearGradient
              id="lg2"
              x1="0"
              y1="0"
              x2="36"
              y2="36"
              gradientUnits="userSpaceOnUse"
            >
              <stop stop-color="#00d2ff" />
              <stop offset="1" stop-color="#3a7bd5" />
            </linearGradient>
          </defs>
          <rect width="36" height="36" rx="9" fill="url(#lg2)" />
          <rect
            x="4"
            y="13"
            width="8"
            height="14"
            rx="1.5"
            fill="white"
            opacity="0.35"
          />
          <rect
            x="14"
            y="8"
            width="8"
            height="19"
            rx="1.5"
            fill="white"
            opacity="0.65"
          />
          <rect
            x="24"
            y="11"
            width="8"
            height="16"
            rx="1.5"
            fill="white"
            opacity="0.9"
          />
          <circle cx="28" cy="19" r="2.5" fill="#1a1a2e" opacity="0.6" />
        </svg>
        <span class="brand-name">Annotate</span>
      </div>
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pen" title="Pen">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
              fill="currentColor"
            />
          </svg>
        </button>
        <button class="tool-btn" data-tool="arrow" title="Arrow">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              d="M12 2l-1.41 1.41L16.17 9H4v2h12.17l-5.58 5.59L12 18l8-8z"
              fill="currentColor"
            />
          </svg>
        </button>
        <button class="tool-btn" data-tool="rect" title="Rectangle">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path d="M3 3h18v18H3V3zm2 2v14h14V5H5z" fill="currentColor" />
          </svg>
        </button>
        <button class="tool-btn" data-tool="text" title="Text">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path d="M5 4v3h5.5v12h3V7H19V4H5z" fill="currentColor" />
          </svg>
        </button>
        <button class="tool-btn" data-tool="blur" title="Blur Region">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <circle
              cx="12"
              cy="12"
              r="8"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-dasharray="3 2"
            />
          </svg>
        </button>
      </div>

      <div class="tool-group">
        <input type="color" id="colorPicker" value="#ff3366" title="Color" />
        <select id="lineWidth" title="Line Width">
          <option value="2">Thin</option>
          <option value="4" selected>Medium</option>
          <option value="8">Thick</option>
        </select>
      </div>

      <div class="tool-group">
        <button class="tool-btn" id="undoBtn" title="Undo">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              d="M12.5 8c-2.65 0-5.05 1.04-6.83 2.73L2 7.07V16h8.93l-3.72-3.72A7.47 7.47 0 0112.5 10c3.04 0 5.64 1.81 6.81 4.41l1.88-.75A9.48 9.48 0 0012.5 8z"
              fill="currentColor"
            />
          </svg>
        </button>
        <button class="tool-btn" id="clearBtn" title="Clear All">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"
              fill="currentColor"
            />
          </svg>
        </button>
      </div>

      <div class="tool-group">
        <button class="btn-save" id="saveBtn">Save PNG</button>
      </div>

      <div class="info" id="widthInfo"></div>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="mainCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>
    </div>

    <script src="annotation.js"></script>
  </body>
</html>
