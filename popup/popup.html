<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Snapshot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <svg
            width="36"
            height="36"
            viewBox="0 0 36 36"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="36" height="36" rx="10" fill="url(#lgrd)" />
            <defs>
              <linearGradient
                id="lgrd"
                x1="0"
                y1="0"
                x2="36"
                y2="36"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#00d2ff" />
                <stop offset="1" stop-color="#3a7bd5" />
              </linearGradient>
            </defs>
            <!-- screens -->
            <rect
              x="4"
              y="13"
              width="8"
              height="14"
              rx="1.5"
              fill="white"
              opacity="0.35"
            />
            <rect
              x="14"
              y="8"
              width="8"
              height="19"
              rx="1.5"
              fill="white"
              opacity="0.65"
            />
            <rect
              x="24"
              y="11"
              width="8"
              height="16"
              rx="1.5"
              fill="white"
              opacity="0.9"
            />
            <!-- camera dot -->
            <circle cx="28" cy="19" r="2.5" fill="#1a1a2e" opacity="0.6" />
          </svg>
        </div>
        <div class="header-text">
          <h1>Responsive Snapshot</h1>
          <p class="subtitle">Capture at every breakpoint</p>
        </div>
        <a href="https://github.com/supersver/Responsive-Snapshot" target="_blank" class="github-link" title="View on GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
        </a>
      </header>

      <div class="divider"></div>

      <section class="presets">
        <div class="section-header">
          <span class="section-title">Device Presets</span>
          <div class="preset-actions">
            <button class="pill-btn" id="selectAll">All</button>
            <button class="pill-btn" id="deselectAll">None</button>
          </div>
        </div>

        <div class="category-group" id="mobileGroup">
          <span class="category-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M17 2H7C5.9 2 5 2.9 5 4v16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-5 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm5-3H7V5h10v12z"
              />
            </svg>
            Mobile
          </span>
          <div class="preset-grid" id="mobilePresets"></div>
        </div>

        <div class="category-group" id="tabletGroup">
          <span class="category-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M21 4H3C1.9 4 1 4.9 1 6v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-10 14c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm10-3H3V6h18v9z"
              />
            </svg>
            Tablet
          </span>
          <div class="preset-grid" id="tabletPresets"></div>
        </div>

        <div class="category-group" id="desktopGroup">
          <span class="category-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M20 3H4C2.9 3 2 3.9 2 5v11c0 1.1.9 2 2 2h6l-1 3H7v2h10v-2h-2l-1-3h6c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 13H4V5h16v11z"
              />
            </svg>
            Desktop
          </span>
          <div class="preset-grid" id="desktopPresets"></div>
        </div>
      </section>

      <div class="divider"></div>

      <section class="options">
        <label class="toggle-label" id="fullPageToggle">
          <div class="toggle-info">
            <span class="toggle-name">Full-page capture</span>
            <span class="toggle-desc">Stitch entire scrollable page</span>
          </div>
          <div class="toggle-switch">
            <input type="checkbox" id="fullPage" checked />
            <span class="toggle-track"></span>
          </div>
        </label>
      </section>

      <button class="btn-capture" id="captureBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8 3.2 3.2 0 0 1 15.2 12 3.2 3.2 0 0 1 12 15.2M12 7a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m-7-1h2.09L8.5 4.5C8.69 4.21 9 4 9.34 4h5.32c.34 0 .65.21.82.5L16.91 6H19c1.1 0 2 .9 2 2v11c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V8c0-1.1.9-2 2-2z"
          />
        </svg>
        <span id="captureText">Capture Snapshots</span>
        <span id="captureSpinner" class="spinner hidden"></span>
      </button>

      <div id="progressWrap" class="progress-wrap hidden">
        <div class="progress-row">
          <span id="progressLabel" class="progress-label"></span>
          <span id="progressPct" class="progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div id="status" class="status hidden"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
